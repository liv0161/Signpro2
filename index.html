<!DOCTYPE html>
<html>
<head>
  <title>SignPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>SignPro</h1>
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<script src="auth.js"></script>
</body>
</html>
